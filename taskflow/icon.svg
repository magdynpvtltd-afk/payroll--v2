<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Mag Dyn TaskFlow">
  <!-- TaskFlow app icon: the Mag Dyn logo with a T under it, for Task.
       Also the favicon, and the icon/badge on push notifications.

       The logo is assets/img/logo.png — the SAME artwork the inventory app
       uses (its topbar brand, login screen, and the PO / inspection-report
       PDFs), embedded here as a data URI so this icon stays a single
       self-contained file that the manifest, the favicon link, the service
       worker and push can all point at.

       It is the PNG rather than taskflow/logo.svg on purpose. logo.svg sets
       the Mag/Dyn wordmark in <text> at "Arial Black", and that font resolves
       to plain Arial's metrics even in Chrome on Windows — the wordmark then
       renders wider than the ribbons it is supposed to sit in and spills out.
       In the PNG the wordmark is artwork, so it cannot reflow, whatever fonts
       the OS launcher or push service happens to have.

       Downscaled to 440px wide (~2x the 217px it occupies here) to keep the
       icon small: the original is 166312 bytes.

       White tile: the logo's ribbons are #E11F26 and its wordmark is knocked
       out in white, so a red tile would erase it. White is how the logo is
       presented everywhere else.

       The manifest declares this "maskable", so every mark stays inside the
       safe zone (a circle of radius 40% = 204.8px about 256,256): the logo's
       furthest corner is at ~196.6, the T's at ~157. The tile is
       full-bleed on purpose — that is what the launcher's crop eats into.

       The T is geometry, not text, so it is font-independent. skewX(-12)
       matches the italic slant of the wordmark above it. -->
  <rect width="512" height="512" rx="96" fill="#ffffff"/>

  <image x="147.5" y="92" width="217" height="173.7" preserveAspectRatio="xMidYMid meet"
         href="data:image/png;base64,"/>

  <!-- T for Task -->
  <g transform="translate(256 345) skewX(-12) translate(-256 -345)" fill="#E11F26">
    <rect x="191" y="280" width="130" height="35" rx="5"/>
    <rect x="238" y="280" width="36" height="130" rx="5"/>
  </g>
</svg>
